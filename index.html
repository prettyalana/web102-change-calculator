
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Change Calculator</h1>

  <div class="form-wrapper">
    <form id="calc-form">
      <div class="amount-wrapper">
        <label for="amount-due">How much is due for the sale?</label>
        <input type="text" id="amount-due">
      </div>
      <div class="amount-wrapper">
        <label for="amount-received">How much has the customer given you?</label>
        <input type="text" id="amount-received">
      </div>
      <button id="calculate-change">Calculate!</button>
    </form>
  </div>

  <div class="dollar-wrapper">
    <h2>Dollar Amount</h2>
    <p id="dollars-output">0</p>
  </div>

  <div class="change-amount">
    <div class="quarter-wrapper">
      <h3>Quarters</h3>
      <p id="quarters-output">0</p>
    </div>
    <div class="dime-wrapper">
      <h3>Dimes</h3>
      <p id="dimes-output">0</p>
    </div>
    <div class="nickel-wrapper">
      <h3>Nickels</h3>
      <p id="nickels-output">0</p>
    </div>
    <div class="penny-wrapper">
      <h3>Pennies</h3>
      <p id="pennies-output">0</p>
    </div>
  </div>



  <script src="main.js" charset="utf-8"></script>

</body>

</html>
